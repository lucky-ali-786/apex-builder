version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: local-postgres
    restart: always
    environment:
      POSTGRES_USER: prisma_user
      POSTGRES_PASSWORD: prisma_password
      POSTGRES_DB: my_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql 
volumes:
  postgres_data: